<!DOCTYPE html>
<html>
<head>
    <title>Serverless To-Do App</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .task-container {
            margin-top: 20px;
        }

        li {
            margin: 10px 0;
            list-style: none;
        }

        button {
            margin-left: 10px;
            cursor: pointer;
        }

        .completed {
            text-decoration: line-through;
            color: gray;
        }

        input[type="text"] {
            width: 70%;
            padding: 8px;
        }

        #addBtn {
            padding: 8px 15px;
        }
    </style>
</head>

<body>

    <h1>To-Do List Application</h1>

    <input type="text" id="taskInput" placeholder="Enter a task">
    <button id="addBtn" onclick="addTask()">Add Task</button>

    <ul id="taskList"></ul>

    <script>
        const API_URL = "https://kqa7nzdha4.execute-api.us-east-1.amazonaws.com/tasks";

        async function loadTasks() {
            const res = await fetch(API_URL);
            const tasks = await res.json();

            const taskList = document.getElementById("taskList");
            taskList.innerHTML = "";

            tasks.forEach(task => {
                const li = document.createElement("li");

                const checkbox = document.createElement("input");
                checkbox.type = "checkbox";
                checkbox.checked = task.completed;

                checkbox.addEventListener("change", () => {
                    updateTask(task.taskId, checkbox.checked);
                });

                const span = document.createElement("span");
                span.textContent = " " + task.task;

                if (task.completed) {
                    span.classList.add("completed");
                }

                const deleteBtn = document.createElement("button");
                deleteBtn.textContent = "Delete";

                deleteBtn.addEventListener("click", () => {
                    deleteTask(task.taskId);
                });

                li.appendChild(checkbox);
                li.appendChild(span);
                li.appendChild(deleteBtn);

                taskList.appendChild(li);
            });
        }

        async function addTask() {
            const input = document.getElementById("taskInput");
            const task = input.value.trim();

            if (!task) {
                alert("Please enter a task.");
                return;
            }

            await fetch(API_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    task: task
                })
            });

            input.value = "";

            loadTasks();
        }

        async function updateTask(taskId, completed) {
            await fetch(`${API_URL}/${taskId}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    completed: completed
                })
            });

            loadTasks();
        }

        async function deleteTask(taskId) {
            await fetch(`${API_URL}/${taskId}`, {
                method: "DELETE"
            });

            loadTasks();
        }

        loadTasks();
    </script>

</body>
</html>
